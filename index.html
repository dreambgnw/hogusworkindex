<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ffnet.work</title>
<style>
  :root {
    --bg: #eeece8;
    --bg2: #e4e2dd;
    --surface: #f5f4f0;
    --text: #1a1a18;
    --text-muted: #5e5e5a;
    --text-subtle: #686864;
    --border: rgba(0,0,0,0.07);
    --border-mid: rgba(0,0,0,0.11);
    --accent-indigo: #3d5a8a;
    --accent-indigo-hover: #2c4268;
    --accent-yellow: #F6C13C;
    --accent-yellow-hover: #e0aa25;
    --radius: 4px;
  }

  [data-theme="dark"] {
    --bg: #2a2a28;
    --bg2: #323230;
    --surface: #3a3a38;
    --text: #e4e4e0;
    --text-muted: #9a9a96;
    --text-subtle: #909090;
    --border: rgba(255,255,255,0.06);
    --border-mid: rgba(255,255,255,0.1);
    --accent-indigo: #6b8fc4;
    --accent-indigo-hover: #8aaad8;
    --accent-yellow: #F6C13C;
    --accent-yellow-hover: #e0aa25;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.35s, color 0.35s;
  }

  .domain {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: lowercase;
    color: var(--text-subtle);
    margin-bottom: 3rem;
    font-weight: 400;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-mid);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    overflow: hidden;
    width: min(560px, 90vw);
  }

  .card {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2rem 1.8rem;
    background: var(--surface);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
    min-height: 180px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .card-yellow::before { background: var(--accent-yellow); }
  .card-indigo::before { background: var(--accent-indigo); }

  .card:hover::before { transform: scaleX(1); }

  .card-yellow:hover { background: var(--bg2); }
  .card-indigo:hover { background: var(--bg2); }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-bottom: 0.6rem;
    transition: color 0.2s;
  }

  .card-yellow:hover .card-label { color: var(--accent-yellow); }
  .card-indigo:hover .card-label { color: var(--accent-indigo); }

  .card-title {
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .card-arrow {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    font-size: 0.7rem;
    color: var(--border-mid);
    transition: color 0.2s, transform 0.2s;
  }

  .card-yellow:hover .card-arrow {
    color: var(--accent-yellow);
    transform: translate(2px, -2px);
  }
  .card-indigo:hover .card-arrow {
    color: var(--accent-indigo);
    transform: translate(2px, -2px);
  }

  .theme-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: none;
    border: 1px solid var(--border-mid);
    border-radius: 50%;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    font-size: 0.75rem;
  }
  .theme-btn:hover { border-color: var(--text-muted); color: var(--text); }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .card { min-height: 140px; }
  }
</style>
</head>
<body>

<p class="domain">ffnet.work</p>

<div class="grid">
  <a class="card card-yellow" href="/main/">
    <span class="card-arrow">↗</span>
    <p class="card-label">Quick Instant</p>
    <p class="card-title">ffnet.work</p>
  </a>
  <a class="card card-indigo" href="https://shunature.one">
    <span class="card-arrow">↗</span>
    <p class="card-label">Indigo Night Dull Moon</p>
    <p class="card-title">shunature.one</p>
  </a>
</div>

<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
</button>

<script>
  const html = document.documentElement;
  const icon = document.getElementById('theme-icon');

  const moonPath = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  const sunPath = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    icon.innerHTML = theme === 'dark' ? moonPath : sunPath;
    localStorage.setItem('theme', theme);
  }

  function toggleTheme() {
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  const saved = localStorage.getItem('theme')
    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(saved);
</script>
</body>
</html>
